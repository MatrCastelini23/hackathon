<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Estágios UniALFA - Empresa</title>
    <link rel="stylesheet" href="css/style.css">
    </head>
<body>

    <div class="login-container">
        <div class="login-card">
            <h2>ESTÁGIO - EMPRESA</h2>
            
            <form action="processa_login.php" method="POST">
                
                <div class="input-group">
                    <span class="icon-box user-icon"></span>
                    <input type="text" name="usuario" placeholder="Usuário" required>
                </div>

                <div class="input-group">
                    <span class="icon-box lock-icon"></span>
                    <input type="password" name="senha" placeholder="Senha" required>
                </div>

                <div class="input-group">
                    <span class="icon-box CNPJ-icon"></span>
                    <input type="text" name="cnpj" placeholder="CNPJ" required>
                </div>

                    <button type="submit" class="btn-entrar">Entrar</button>

                <div class="links-uteis">
                    <a href="recuperarSenhaE.html">Esqueceu sua senha?</a><br>
                    <a href="cadastroEmpresa.html">Criar novo cadastro</a>
                </div>

            </form>
        </div>
    </div>

</body>
</html>
