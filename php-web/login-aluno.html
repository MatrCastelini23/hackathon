<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Estágios UniALFA - Aluno</title>
    <link rel="stylesheet" href="css/style.css">
    </head>
<body>

    <div class="login-container">
        <div class="login-card">
            <h2>ESTÁGIO - ALUNO</h2>
            
            <form action="processa_login.php" method="POST">
                
                <div class="input-group">
                    <span class="icon-box user-icon"></span> 
                    <input type="text" name="usuario" placeholder="Usuário" required>                    
                </div>

                <div class="input-group">
                    <span class="icon-box lock-icon"></span> 
                    <input type="password" name="senha" placeholder="Senha" required>
                </div>

                <div class="input-group">
                    <span class="icon-box email-icon"></span> 
                    <input type="email" name="email" placeholder="Email" required>
                    
                </div>

                  <button type="submit" class="btn-entrar">Entrar</button>

                <div class="links-uteis">
                    <a href="recuperarSenhaA.html">Esqueceu sua senha?</a><br>
                    <a href="cadastroAluno.html">Novo cadastro</a>
                </div>

                
            </form>
        </div>
    </div>

</body>
</html>
