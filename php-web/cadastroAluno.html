<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Aluno - UniALFA</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="cadastro-container">
        <div class="cadastro-card">
            <h2>Cadastro de Aluno</h2>
            
            <div id="msg-sucesso" style="display: none;" class="msg-alerta-sucesso">
                Aluno cadastrado com sucesso!!!
            </div>

            <form id="form-aluno" onsubmit="salvarAlunoCRUD(event)">
                <div class="cadastro-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" required placeholder="Digite seu nome completo">
                </div>

                <div class="cadastro-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" required placeholder="seuemail@exemplo.com">
                </div>

                <div class="cadastro-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" required placeholder="000.000.000-00">
                </div>

                <div class="cadastro-group">
                    <label for="data_nasc">Data de Nascimento</label>
                    <input type="date" id="data_nasc" required>
                </div>

                <div class="cadastro-group">
                    <label for="tel">Telefone / WhatsApp</label>
                    <input type="tel" id="tel" required placeholder="(00) 00000-0000">
                </div>

                <div class="cadastro-group">
                    <label for="senha">Criar Senha</label>
                    <input type="password" id="senha" required placeholder="Crie uma senha segura">
                </div>

                <button type="submit" class="btn-cadastro">Cadastrar Aluno</button>
            </form>

            <div class="cadastro-links">
                <a href="login-aluno.html">Já tem uma conta? Faça Login</a>
            </div>
        </div>
    </div>

    <script>
    function salvarAlunoCRUD(event) {
        event.preventDefault();
        
        const novoAluno = {
            nome: document.getElementById('nome').value,
            email: document.getElementById('email').value,
            cpf: document.getElementById('cpf').value,
            data_nascimento: document.getElementById('data_nasc').value,
            telefone: document.getElementById('tel').value,
            tipo: 'aluno'
        };

        // Regra de CRUD: Create local
        localStorage.setItem('crud_aluno_local', JSON.stringify(novoAluno));

        document.getElementById('form-aluno').style.display = 'none';
        document.getElementById('msg-sucesso').style.display = 'block';
    }
    </script>

</body>
</html>
